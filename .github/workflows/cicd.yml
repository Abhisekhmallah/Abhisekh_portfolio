name: Next.js CI with Security Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-scan:
    runs-on: self-hosted

    steps:
      # 1️ Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # 3️ Install dependencies
      - name: Install dependencies
        run: npm install --legacy-peer-deps

      # 4️ Build Next.js app
      - name: Build project
        run: npm run build

      # 5 SonarQube Scan continue-on-error: 
      - name: SonarQube Scan
        run: |
          npx sonar-scanner \
            -Dsonar.projectKey=nextjs-project \
            -Dsonar.host.url=http://16.171.162.223:9000 \
            -Dsonar.login=${{ secrets.SONAR_TOKEN }}

      # 6 Run Trivy filesystem scan
      - name: Run Trivy FS Scan
        uses: aquasecurity/trivy-action@0.20.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          format: table
          exit-code: 1

      # 7 build docker images and push:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      -
        name: Build and push
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: abhisekhmallah/my-portfolio:latest
